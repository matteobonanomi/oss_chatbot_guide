name: ai-stack

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks: [internal]

  vectordb:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RAG_POSTGRES_DB}
      POSTGRES_USER: ${RAG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD}
    volumes:
      - rag_pg_data:/var/lib/postgresql/data
    networks: [internal]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OR_SITE_URL: ${OR_SITE_URL}
      OR_APP_NAME: ${OR_APP_NAME}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    networks: [internal]

  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    restart: unless-stopped
    depends_on:
      - vectordb
    environment:
      DB_HOST: vectordb
      DB_PORT: 5432
      POSTGRES_DB: ${RAG_POSTGRES_DB}
      POSTGRES_USER: ${RAG_POSTGRES_USER}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD}
      VECTOR_DB_TYPE: pgvector
      RAG_HOST: 0.0.0.0
      RAG_PORT: 8000

      EMBEDDINGS_PROVIDER: openai
      EMBEDDINGS_MODEL: text-embedding-3-small
      RAG_OPENAI_API_KEY: ${RAG_OPENAI_API_KEY}

      COLLECTION_NAME: ${RAG_COLLECTION_NAME}
      CHUNK_SIZE: ${RAG_CHUNK_SIZE}
      CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP}
      EMBEDDING_BATCH_SIZE: ${RAG_EMBEDDING_BATCH_SIZE}
      EMBEDDING_MAX_QUEUE_SIZE: ${RAG_EMBEDDING_MAX_QUEUE_SIZE}
      PDF_EXTRACT_IMAGES: ${PDF_EXTRACT_IMAGES}
      JWT_SECRET: ${JWT_SECRET}

      DEBUG_RAG_API: ${DEBUG_RAG_API}
      DEBUG_PGVECTOR_QUERIES: ${DEBUG_PGVECTOR_QUERIES}
    volumes:
      - rag_uploads:/app/uploads
    networks: [internal]

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    restart: unless-stopped
    depends_on:
      - mongodb
      - litellm
      - rag_api
    environment:
      HOST: 0.0.0.0
      PORT: 3080

      # Login/Registrazione
      ALLOW_EMAIL_LOGIN: ${ALLOW_EMAIL_LOGIN}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION}
      ALLOW_SOCIAL_LOGIN: ${ALLOW_SOCIAL_LOGIN}
      ALLOW_SOCIAL_REGISTRATION: ${ALLOW_SOCIAL_REGISTRATION}
      SESSION_EXPIRY: ${SESSION_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}

      # LibreChat + LiteLLM
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}

      # LibreChat usa MongoDB
      MONGO_URI: mongodb://mongodb:27017/LibreChat

      # Crypto/JWT
      CREDS_KEY: ${CREDS_KEY}
      CREDS_IV: ${CREDS_IV}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      # RAG
      RAG_API_URL: ${RAG_API_URL}
      RAG_USE_FULL_CONTEXT: ${RAG_USE_FULL_CONTEXT}

      # Opzionale
      NODE_ENV: production
      PUBLIC_URL: ${PUBLIC_URL}
    ports:
      - "127.0.0.1:3080:3080"
    networks: [internal]
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - librechat
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:
  rag_pg_data:
  rag_uploads: