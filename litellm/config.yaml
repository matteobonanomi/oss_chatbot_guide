model_list:
  # BIG QWEN (paid only on OpenRouter in the results checked)
  - model_name: qwen_big
    litellm_params:
      model: openrouter/qwen/qwen3.5-122b-a10b
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # MEDIUM QWEN (best exact 10-20B tier with same-model free + paid)
  - model_name: qwen_medium
    litellm_params:
      model: openrouter/qwen/qwen3-14b:free
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  - model_name: qwen_medium_paid
    litellm_params:
      model: openrouter/qwen/qwen3-14b
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # SMALL QWEN (<10B): free rescue + latest paid small
  - model_name: qwen_small
    litellm_params:
      model: openrouter/qwen/qwen3-8b:free
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  - model_name: qwen_small_paid
    litellm_params:
      model: openrouter/qwen/qwen3.5-9b
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # MISTRAL: newest practical reasoning-capable generalist
  - model_name: mistral_reasoning
    litellm_params:
      model: openrouter/mistralai/mistral-small-2603
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # EMBEDDINGS (optional upgrade from bge-m3; changing this requires full re-embedding)
  - model_name: qwen_embeddings
    litellm_params:
      model: openrouter/qwen/qwen3-embedding-4b
      api_key: os.environ/OPENROUTER_API_KEY
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
  # default embeddings models
  - model_name: bge-m3
    litellm_params:
      model: openrouter/baai/bge-m3
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  # Makes reasoning/tool calls less fragile across providers and clients
  modify_params: true
  drop_params: true

  # Free -> paid -> stronger fallback chains
  fallbacks:
    - {"qwen_small": ["qwen_small_paid", "qwen_medium_paid", "qwen_big"]}
    - {"qwen_small_paid": ["qwen_medium_paid", "qwen_big"]}
    - {"qwen_medium": ["qwen_medium_paid", "qwen_small_paid", "qwen_big"]}
    - {"qwen_medium_paid": ["qwen_small_paid", "qwen_big"]}
    - {"qwen_big": ["qwen_medium_paid", "qwen_small_paid", "mistral_reasoning"]}
    - {"mistral_reasoning": ["qwen_medium_paid", "qwen_small_paid"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  max_budget: 15