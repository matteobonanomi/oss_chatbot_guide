model_list:
  # Plain benchmark / zero-thinking path
  - model_name: benchmark_plain
    litellm_params:
      model: openrouter/qwen/qwen3-8b:free
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
      stream_timeout: 15
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
      extra_body:
        reasoning:
          effort: none
          exclude: true
    model_info:
      supports_reasoning: false

  - model_name: benchmark_plain_paid
    litellm_params:
      model: openrouter/qwen/qwen3-8b
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
      stream_timeout: 15
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
      extra_body:
        reasoning:
          effort: none
          exclude: true
    model_info:
      supports_reasoning: false

  # Small Qwen (<10B), latest stronger paid option
  - model_name: qwen_small
    litellm_params:
      model: openrouter/qwen/qwen3.5-9b
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
      stream_timeout: 20
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # Medium Qwen (10-20B) with free + paid
  - model_name: qwen_medium
    litellm_params:
      model: openrouter/qwen/qwen3-14b:free
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
      stream_timeout: 20
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  - model_name: qwen_medium_paid
    litellm_params:
      model: openrouter/qwen/qwen3-14b
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 90
      stream_timeout: 20
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # Big Qwen (80B+ class), strongest main model
  - model_name: qwen_big
    litellm_params:
      model: openrouter/qwen/qwen3.5-122b-a10b
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 180
      stream_timeout: 30
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # Mistral alternative
  - model_name: mistral_reasoning
    litellm_params:
      model: openrouter/mistralai/mistral-small-2603
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 120
      stream_timeout: 25
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME
    model_info:
      supports_reasoning: true

  # Embeddings for RAG
  - model_name: bge-m3
    litellm_params:
      model: openrouter/baai/bge-m3
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 120
      extra_headers:
        HTTP-Referer: os.environ/OR_SITE_URL
        X-Title: os.environ/OR_APP_NAME

litellm_settings:
  modify_params: true
  drop_params: true

  fallbacks:
    - {"benchmark_plain": ["benchmark_plain_paid", "qwen_small", "qwen_medium_paid", "qwen_big"]}
    - {"benchmark_plain_paid": ["qwen_small", "qwen_medium_paid", "qwen_big"]}
    - {"qwen_small": ["qwen_medium_paid", "benchmark_plain_paid", "qwen_big"]}
    - {"qwen_medium": ["qwen_medium_paid", "qwen_small", "qwen_big"]}
    - {"qwen_medium_paid": ["qwen_big", "mistral_reasoning", "qwen_small"]}
    - {"qwen_big": ["qwen_medium_paid", "mistral_reasoning", "qwen_small"]}
    - {"mistral_reasoning": ["qwen_medium_paid", "qwen_small", "benchmark_plain_paid"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  max_budget: 15
