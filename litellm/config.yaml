litellm_settings:
  fallbacks:
    - {"qwen_small": ["qwen_small_paid"]}
    - {"qwen_8b": ["qwen_8b_paid"]}
    - {"qwen_14b": ["qwen_14b_paid"]}
    - {"gemma3_27b": ["gemma3_27b_paid"]}
    - {"llama_70b": ["llama_70b_paid"]}
    - {"qwen_80b": ["qwen_80b_paid"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  max_budget: 15
