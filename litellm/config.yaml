litellm_settings:
  modify_params: true
  drop_params: true
  allowed_params:
    - plugins
  max_fallbacks: 4
  fallbacks:
    - {"small_plain": ["small_plain_paid", "small_plain_backup1"]}
    - {"small_light": ["small_light_paid", "small_light_backup1", "small_light_backup2"]}
    - {"medium_balanced": ["medium_balanced_paid", "medium_balanced_backup1", "medium_balanced_backup2"]}
    - {"medium_deep": ["medium_deep_backup1", "medium_deep_backup2", "medium_deep_backup3"]}
    - {"large_balanced": ["large_balanced_paid", "large_balanced_backup1", "large_balanced_backup2"]}
    - {"large_max": ["large_max_backup1", "large_max_backup2", "large_max_backup3"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  max_budget: 15
  model_max_requests: 
    small_plain: 10
    small_light: 8
    medium_balanced: 6
    medium_deep: 4
    large_balanced: 3
    large_max: 2
  model_info_map:
    small_plain:
      max_input_tokens: 32000
      max_output_tokens: 8192
    small_light:
      max_input_tokens: 32000
      max_output_tokens: 8192
    medium_balanced:
      max_input_tokens: 32000
      max_output_tokens: 8192
    medium_deep:
      max_input_tokens: 32000
      max_output_tokens: 8192
    large_balanced:
      max_input_tokens: 32000
      max_output_tokens: 8192
    large_max:
      max_input_tokens: 32000
      max_output_tokens: 8192
  budget_ttb: 10
