version: 1.3.5

interface:
  fileSearch: true
  fileCitations: true

endpoints:
  agents:
    disableBuilder: false
    maxCitations: 20
    maxCitationsPerFile: 5
    minRelevanceScore: 0.6
    capabilities:
      - "file_search"
      - "context"
  custom:
    - name: "LiteLLM"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm:4000/v1"
      models:
        default:
          - qwen_small
          - qwen_8b
          - qwen_14b
          - mistral_24b
          - gemma3_27b
          - qwen_30b
          - llama_70b
          - qwen_80b
      titleConvo: true
      modelDisplayLabel: "LiteLLM"

fileConfig:
  endpoints:
    default:
      fileLimit: 5
      fileSizeLimit: 25
      totalSizeLimit: 75
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"
    agents:
      fileLimit: 10
      fileSizeLimit: 25
      totalSizeLimit: 150
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"
    LiteLLM:
      fileLimit: 5
      fileSizeLimit: 25
      totalSizeLimit: 75
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"
  serverFileSizeLimit: 30
  avatarSizeLimit: 2
  fileTokenLimit: 100000
  text:
    supportedMimeTypes:
      - "^application/pdf$"
      - "^text/(plain|markdown|csv|json|xml|html|css|javascript|typescript|x-python|x-java|x-csharp|x-php|x-ruby|x-go|x-rust|x-kotlin|x-swift|x-scala|x-perl|x-lua|x-shell|x-sql|x-yaml|x-toml)$"
      - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
      - "^application/msword$"