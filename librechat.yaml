version: 1.3.5

interface:
  fileSearch: true
  fileCitations: true
  modelSelect: true
  parameters: true
  presets: true

endpoints:
  agents:
    disableBuilder: false
    maxCitations: 20
    maxCitationsPerFile: 5
    minRelevanceScore: 0.6
    capabilities:
      - "file_search"
      - "context"
  custom:
    - name: "OpenRouter"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm:4000/v1"
      models:
        default:
          - qwen_small
          - qwen_medium
          - qwen_big
          - mistral_reasoning
      titleConvo: true
      titleModel: "qwen_small"
      modelDisplayLabel: "Gateway"
      customParams:
        defaultParamsEndpoint: "openAI"
        paramDefinitions:
          - key: reasoning_effort
            default: minimal
          - key: reasoning_summary
            default: ""
          - key: verbosity
            default: medium

fileConfig:
  endpoints:
    default:
      fileLimit: 5
      fileSizeLimit: 25
      totalSizeLimit: 75
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"
    agents:
      fileLimit: 10
      fileSizeLimit: 25
      totalSizeLimit: 150
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"
    OpenRouter:
      fileLimit: 5
      fileSizeLimit: 25
      totalSizeLimit: 75
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"
  serverFileSizeLimit: 30
  avatarSizeLimit: 2
  fileTokenLimit: 100000
  text:
    supportedMimeTypes:
      - "^application/pdf$"
      - "^text/(plain|markdown|csv|json|xml|html|css|javascript|typescript|x-python|x-java|x-csharp|x-php|x-ruby|x-go|x-rust|x-kotlin|x-swift|x-scala|x-perl|x-lua|x-shell|x-sql|x-yaml|x-toml)$"
      - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
      - "^application/msword$"
