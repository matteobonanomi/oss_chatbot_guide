version: 1.3.5

interface:
  fileSearch: true
  webSearch: true
  fileCitations: true
  modelSelect: true
  parameters: true
  presets: true
  agents:
    use: true
    create: true
    share: true
    public: true

modelSpecs:
  enforce: false
  prioritize: false
  list:
    - name: "small-no-reasoning"
      label: "Small · No Reasoning"
      webSearch: true
      fileSearch: true
      description: "Benchmark rapido: Qwen small con reasoning disattivato lato proxy."
      preset:
        endpoint: "OpenRouter"
        model: "small_plain"
        modelLabel: "Small · No Reasoning"
        disableStreaming: false

    - name: "small-light"
      label: "Small · Light"
      webSearch: true
      fileSearch: true
      description: "Qwen small economico con reasoning minimo."
      preset:
        endpoint: "OpenRouter"
        model: "small_light"
        modelLabel: "Small · Light"
        disableStreaming: false

    - name: "medium-balanced"
      label: "Medium · Balanced"
      webSearch: true
      fileSearch: true
      description: "Categoria medium con priorità a free/cheap e reasoning leggero."
      preset:
        endpoint: "OpenRouter"
        model: "medium_balanced"
        modelLabel: "Medium · Balanced"
        disableStreaming: false

    - name: "medium-deep"
      label: "Medium · Deep"
      webSearch: true
      fileSearch: true
      description: "Categoria medium ottimizzata per qualità, con reasoning medio."
      preset:
        endpoint: "OpenRouter"
        model: "medium_deep"
        modelLabel: "Medium · Deep"
        disableStreaming: false

    - name: "large-balanced"
      label: "Large · Balanced"
      webSearch: true
      fileSearch: true
      description: "Large più rapido/stabile, con primo hop free se disponibile."
      preset:
        endpoint: "OpenRouter"
        model: "large_balanced"
        modelLabel: "Large · Balanced"
        disableStreaming: false

    - name: "large-max"
      label: "Large · Max"
      webSearch: true
      fileSearch: true
      description: "Preset large più robusto: massima qualità e massimo reasoning."
      preset:
        endpoint: "OpenRouter"
        model: "large_max"
        modelLabel: "Large · Max"
        disableStreaming: false

endpoints:
  agents:
    disableBuilder: false
    allowedProviders:
      - "OpenRouter"
    maxCitations: 20
    maxCitationsPerFile: 5
    minRelevanceScore: 0.6
    capabilities:
      - "tools"
      - "file_search"
      - "context"
      - "web_search"

  custom:
    - name: "OpenRouter"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm:4000/v1"
      models:
        default:
          - "small_plain"
          - "small_light"
          - "medium_balanced"
          - "medium_deep"
          - "large_balanced"
          - "large_max"
        fetch: false
      titleConvo: true
      titleModel: "current_model"
      titleMethod: "completion"
      modelDisplayLabel: "OpenRouter"

webSearch:
  searchProvider: "serper"
  scraperProvider: "serper"
  serperApiKey: "${SERPER_API_KEY}"
  scraperTimeout: 20000
  safeSearch: 1
  maxResults: 5
  resultCount: 5

fileConfig:
  endpoints:
    default:
      fileLimit: 5
      fileSizeLimit: 25
      totalSizeLimit: 75
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"

    agents:
      fileLimit: 10
      fileSizeLimit: 25
      totalSizeLimit: 150
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"

    OpenRouter:
      fileLimit: 5
      fileSizeLimit: 25
      totalSizeLimit: 75
      supportedMimeTypes:
        - "^application/pdf$"
        - "^text/.*"
        - "^application/json$"
        - "^application/xml$"
        - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
        - "^application/msword$"

  serverFileSizeLimit: 30
  avatarSizeLimit: 2
  fileTokenLimit: 100000

  text:
    supportedMimeTypes:
      - "^application/pdf$"
      - "^text/(plain|markdown|csv|json|xml|html|css|javascript|typescript|x-python|x-java|x-csharp|x-php|x-ruby|x-go|x-rust|x-kotlin|x-swift|x-scala|x-perl|x-lua|x-shell|x-sql|x-yaml|x-toml)$"
      - "^application/vnd.openxmlformats-officedocument.wordprocessingml.document$"
      - "^application/msword$"